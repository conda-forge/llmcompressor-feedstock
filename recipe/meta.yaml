{% set name = "llmcompressor" %}
{% set version = "0.10.0.1" %}

package:
  name: llmcompressor
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/l/llmcompressor/llmcompressor-{{ version }}.tar.gz
  sha256: f8915064ab47f14245e01f1d99012420c7ddf77b56612d368522afb959893a65

build:
  entry_points:
    - llmcompressor.trace=llmcompressor.transformers.tracing.debug:main
  noarch: python
  script:
    - export SETUPTOOLS_SCM_PRETEND_VERSION="$PKG_VERSION"   # [unix]
    - set "SETUPTOOLS_SCM_PRETEND_VERSION=%PKG_VERSION%"     # [win]
    - export BUILD_TYPE=release  # [unix]
    - set "BUILD_TYPE=release"  # [win]
    - {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}.*
    - setuptools
    - wheel
    - setuptools-scm >8
    - pip
  run:
    - python >={{ python_min }}
    - loguru >=0.7.2,<=0.7.3
    - pyyaml >=6.0.1,<=6.0.3
    - numpy >=2.0.0,<=2.4.2
    - requests >=2.32.2,<=2.32.5
    - tqdm >=4.66.3,<=4.67.3
    - pytorch >=2.9.0,<=2.10.0
    - transformers >=4.56.1,<=4.57.6
    - datasets >=4.0.0,<=4.6.0
    - auto-round >=0.9.6,<=0.10.2
    - accelerate >=1.6.0,<=1.12.0
    - nvidia-ml-py >=12.560.30,<=13.590.48
    - pillow >=10.4.0,<=12.1.1
    - compressed-tensors ==0.14.0.1

test:
  imports:
    - llmcompressor
  commands:
    - pip check
    - llmcompressor.trace --help
  requires:
    - pip
    - python {{ python_min }}.*

about:
  home: https://github.com/vllm-project/llm-compressor
  summary: A library for compressing large language models utilizing the latest techniques and research in the field for both training aware and post training techniques. The library is designed to be flexible and easy to use on top of PyTorch and HuggingFace Transformers, allowing for quick experimentation.
  license: Apache-2.0
  license_file:
    - LICENSE
    - NOTICE

extra:
  recipe-maintainers:
    - timkpaine
